<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quill Test</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>
    <div id="editor"></div>
    <script>
        const editor = new Quill('#editor', { theme: 'snow' });
        const text = `<ul>
  <li><strong>Pemasangan dan Aksesibilitas:</strong> Posisi APAR mudah dilihat, dilengkapi tanda lokasi yang jelas, serta terpasang menggantung pada bracket dengan ketinggian yang memenuhi standar (antara 50 cm hingga 125 cm).</li>
  <li><strong>Kondisi Fisik dan Komponen:</strong> Tabung, pin pengaman, nozzle, dan selang (hose) dalam kondisi prima tanpa adanya kerusakan atau sumbatan debu. Label petunjuk penggunaan dan tanggal kedaluwarsa terbaca dengan jelas, serta tekanan pada manometer berada di batas aman (zona hijau).</li>
</ul>`;
        editor.root.innerHTML = text;
        
        setTimeout(() => {
            console.log("Quill DOM after mutation observer:", editor.root.innerHTML);
        }, 1000);
    </script>
</body>
</html>
